{
  "layer": "bottom",
  "position": "bottom",
  "height": 40,
  "spacing": 2,
  "exclusive": true,
  "gtk-layer-shell": true,
  "passthrough": false,
  "fixed-center": true,
  "modules-left": ["niri/workspaces", "niri/window"],
  "modules-center": ["clock"],
  "modules-right": [
    "cpu",
    "memory",
    "custom/hypridle",
    "custom/powerprofile",
    "upower",
    "tray",
    "custom/notification",
    "clock#simpleclock",
    "custom/shutdown",
  ],
  "niri/workspaces": {
    "on-click": "activate",
    "format": "{index}",
    "all-outputs": true,
    "disable-scroll": false,
    "active-only": false,
  },
  "niri/window": {
    "format": "{title}",
  },
  "tray": {
    "show-passive-items": true,
    "spacing": 10,
  },
  "clock#simpleclock": {
    "tooltip": false,
    "format": " {:%H:%M}",
  },
  "clock": {
    "format": " {:L%a %d %b}",
    "calendar": {
      "format": {
        "days": "<span weight='normal'>{}</span>",
        "months": "<span color='#cdd6f4'><b>{}</b></span>",
        "today": "<span color='#f38ba8' weight='700'><u>{}</u></span>",
        "weekdays": "<span color='#f9e2af'><b>{}</b></span>",
        "weeks": "<span color='#a6e3a1'><b>W{}</b></span>",
      },
      "mode": "month",
      "mode-mon-col": 1,
      "on-scroll": 1,
    },
    "tooltip-format": "<span color='#cdd6f4' font='Lexend 16'><tt><small>{calendar}</small></tt></span>",
  },
  "cpu": {
    "format": " {usage}%",
    "tooltip": true,
    "interval": 1,
  },
  "memory": {
    "format": " {used:0.1f}Gi",
  },
  "pulseaudio": {
    "format": "{icon} {volume}%",
    "format-muted": "  muted",
    "format-icons": {
      "headphone": "",
      "default": [" ", " ", " "],
    },
    "on-click": "pavucontrol",
  },
  "custom/sep": {
    "format": "|",
    "tooltip": false,
  },
  "custom/notification": {
    "escape": true,
    "exec": "swaync-client -swb",
    "exec-if": "which swaync-client",
    "format": "{icon}",
    "format-icons": {
      "none": "󰅺",
      "notification": "󰡟",
    },
    "on-click": "sleep 0.1 && swaync-client -t -sw",
    "return-type": "json",
    "tooltip": false,
  },
"upower": {
     "icon-size": 20,
     "hide-if-empty": true,
     "tooltip": true,
     "tooltip-spacing": 20,
     "format": " {percentage}"
    },
"backlight": {
    "device": "nvidia_wmi_ec_backlight",
    "format": "{icon} {percent}%",
    "format-icons": ["", ""],
    },
  "user": {
        "format": "{user}",
        "interval": 60,
        "height": 30,
        "width": 30,
        "icon": true,
    },
    "custom/shutdown": {
                "format": "⏻",
                "tooltip-format": "Shutdown",
                "on-click": "wlogout -b 5"
    },

    "mpris": {
            "interval": 1,
	        "format": "{player_icon} {position}/{length}",
	        "format-paused": "{status_icon} <i>{position}/{length}</i>",
	        "player-icons": {
		        "default": "▶",
		        "mpv": "🎵"
	        },
	        "status-icons": {
	    	    "paused": "⏸"
	        }
    },

    "custom/hypridle": {
        "format": "{}",
        "exec": "~/.config/waybar/scripts/check_swayidle.sh",
        "interval": "once",
        "on-click": "~/.config/waybar/scripts/toggle_swayidle.sh",
        "tooltip": true,
        "tooltip-format": "Swayidle status",
        "signal": 8
    },

    "custom/powerprofile": {
        "exec": "~/.config/waybar/scripts/check_power_profile.sh",
        "interval": "once",
        "tooltip": true,
        "tooltip-format": "Power profiles",
        "on-click": "~/.config/waybar/scripts/change_power_profile.sh",
        "signal": 8
    },
}
